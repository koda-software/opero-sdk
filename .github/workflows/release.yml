name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build standalone CLI artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate OpenAPI snapshot
        run: pnpm openapi:check

      - name: Build standalone tarballs
        run: pnpm pack:standalone
        env:
          OPERO_PACK_SHA: ${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/standalone/*
          generate_release_notes: true
